project_id = "midsouthwx"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://midsouthwx.vercel.app"]
jwt_expiry = 3600
enable_signup = false
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = false
double_confirm_changes = true
enable_confirmations = false

[auth.email.template.magic_link]
subject = "Mid-South WX — your sign-in link"

[edge_runtime]
enabled = true
inspector_port = 8083

[functions.signup]
verify_jwt = false

[functions.telegram-webhook]
verify_jwt = false

[functions.telegram-send-worker]
verify_jwt = false
