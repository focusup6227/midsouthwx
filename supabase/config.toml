project_id = "midsouthwx"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
# NOTE: this file configures the LOCAL Supabase stack. site_url stays localhost so
# local magic-link / invite flows redirect back to the dev server. The PRODUCTION
# Site URL (https://midsouthwx.app), redirect allowlist, and email templates are
# managed in the Supabase Dashboard (Authentication → URL Configuration / Emails) —
# do NOT `supabase config push` this, or it will overwrite prod Site URL with localhost.
site_url = "http://localhost:3000"
additional_redirect_urls = [
  "http://localhost:3000/auth/callback",
  "https://midsouthwx.app",
  "https://midsouthwx.app/auth/callback",
  "https://midsouthwx.vercel.app",
  "https://midsouthwx.vercel.app/auth/callback",
]
jwt_expiry = 3600
enable_signup = false
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = false
double_confirm_changes = true
enable_confirmations = false

[auth.email.template.magic_link]
subject = "Mid-South WX — your sign-in link"
content_path = "./supabase/templates/magic_link.html"

[auth.email.template.invite]
subject = "You're invited to operate Mid-South WX"
content_path = "./supabase/templates/invite.html"

[edge_runtime]
enabled = true
inspector_port = 8083

[functions.signup]
verify_jwt = false

[functions.telegram-webhook]
verify_jwt = false

[functions.telegram-send-worker]
verify_jwt = false

[functions.scheduled-dispatcher]
verify_jwt = false

[functions.nws-poll]
verify_jwt = false

[functions.nws-dispatcher]
verify_jwt = false

[functions.lsr-poll]
verify_jwt = false

[functions.spc-poll]
verify_jwt = false

[functions.afd-poll]
verify_jwt = false

[functions.librewxr-poll]
verify_jwt = false

[functions.cap-dispatcher]
verify_jwt = false

[functions.health-monitor]
verify_jwt = false

[functions.event-recap]
verify_jwt = false

[functions.couplet-poll]
verify_jwt = false

[functions.couplet-dispatcher]
verify_jwt = false
